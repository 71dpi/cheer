<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CHEER!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Bebas+Neue&family=Inter:wght@400;700;900&family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-pink: #ff2d78;
    --electric-yellow: #ffe600;
    --deep-purple: #1a0a2e;
    --mid-purple: #2d1458;
    --bright-cyan: #00f5ff;
    --lime: #aaff00;
    --white: #ffffff;
    --dark: #07040f;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'Boogaloo', cursive;
    color: var(--white);
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ─── BG NOISE/GRAIN ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* ─── SCANLINES ─── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 998;
  }

  /* ─── FOOTER ICONS ─── */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 16px 0 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
  }
  .icon-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    transition: all 0.2s;
    text-decoration: none;
    backdrop-filter: blur(8px);
  }
  .icon-btn:hover {
    border-color: rgba(255,255,255,0.35);
    color: var(--white);
    background: rgba(255,255,255,0.1);
    transform: translateY(-2px);
  }
  .icon-btn.num-71 {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: -0.5px;
  }
  .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* ══════════════════════════════════════
     START SCREEN
  ══════════════════════════════════════ */
  #start {
    background: radial-gradient(ellipse 80% 60% at 50% 40%, #2d0a5e 0%, var(--dark) 70%);
  }

  .title-block {
    text-align: center;
    margin-bottom: 8px;
    position: relative;
  }
  .title-block .eyebrow {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 6px;
    font-size: 13px;
    color: var(--electric-yellow);
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .main-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(88px, 22vw, 140px);
    line-height: 0.9;
    color: var(--white);
    text-shadow:
      0 0 30px rgba(255,45,120,0.8),
      0 0 60px rgba(255,45,120,0.4),
      0 0 120px rgba(255,45,120,0.2);
    letter-spacing: 4px;
    position: relative;
  }
  .main-title .exclaim {
    color: var(--neon-pink);
    animation: pulse-pink 1.2s ease-in-out infinite alternate;
  }
  @keyframes pulse-pink {
    from { text-shadow: 0 0 20px rgba(255,45,120,1), 0 0 40px rgba(255,45,120,0.6); }
    to   { text-shadow: 0 0 40px rgba(255,45,120,1), 0 0 80px rgba(255,45,120,0.8), 0 0 120px rgba(255,45,120,0.4); }
  }

  .subtitle {
    font-size: clamp(16px, 4vw, 22px);
    color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
    margin-top: 4px;
    text-transform: lowercase;
  }

  /* character preview on start */
  #start-char {
    margin: 18px 0 12px;
    animation: bounce-idle 2s ease-in-out infinite;
  }
  @keyframes bounce-idle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .start-btn {
    margin-top: 10px;
    background: var(--neon-pink);
    color: var(--white);
    border: none;
    padding: 16px 52px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 30px rgba(255,45,120,0.6), 0 6px 20px rgba(0,0,0,0.4);
    position: relative;
    overflow: hidden;
  }
  .start-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, transparent 60%);
    border-radius: inherit;
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(255,45,120,0.9), 0 8px 30px rgba(0,0,0,0.5); }
  .start-btn:active { transform: scale(0.97); }

  .timer-badge {
    margin-top: 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ══════════════════════════════════════
     GAME SCREEN
  ══════════════════════════════════════ */
  #game {
    background: radial-gradient(ellipse 90% 70% at 50% 30%, #1a0838 0%, var(--dark) 75%);
    overflow: hidden;
    cursor: pointer;
  }

  .game-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 18px 20px 0;
    z-index: 10;
  }

  /* Timer */
  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: var(--white);
    transition: color 0.3s;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }
  .timer-display.warn {
    color: var(--neon-pink);
    animation: timer-warn 0.5s ease-in-out infinite alternate;
  }
  @keyframes timer-warn {
    from { text-shadow: 0 0 10px rgba(255,45,120,0.8); }
    to   { text-shadow: 0 0 30px rgba(255,45,120,1), 0 0 60px rgba(255,45,120,0.6); }
  }
  .timer-label {
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-align: center;
  }

  /* Hype Meter */
  .hype-container {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .hype-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.5);
  }
  .hype-bar-outer {
    width: 120px;
    height: 18px;
    background: rgba(255,255,255,0.08);
    border-radius: 9px;
    border: 1px solid rgba(255,255,255,0.12);
    overflow: hidden;
    position: relative;
  }
  .hype-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 9px;
    background: linear-gradient(90deg, #ff2d78 0%, #ff8c00 50%, #ffe600 100%);
    transition: width 0.1s linear;
    box-shadow: 0 0 10px rgba(255,45,120,0.5);
    position: relative;
  }
  .hype-bar-fill::after {
    content: '';
    position: absolute;
    top: 2px; left: 4px; right: 4px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }
  .hype-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--electric-yellow);
    text-align: right;
  }

  /* Character in game */
  #game-char {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    transition: transform 0.05s;
  }
  #game-char.tapped {
    animation: tap-bounce 0.15s ease-out;
  }
  @keyframes tap-bounce {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.08); }
    100% { transform: translateX(-50%) scale(1); }
  }

  /* TAP ripples */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,45,120,0.4) 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    animation: ripple-out 0.6s ease-out forwards;
    z-index: 3;
  }
  @keyframes ripple-out {
    to { transform: translate(-50%, -50%) scale(4); opacity: 0; }
  }

  /* tap combo particles */
  .tap-particle {
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--electric-yellow);
    pointer-events: none;
    animation: float-up 0.9s ease-out forwards;
    z-index: 20;
    text-shadow: 0 0 10px rgba(255,230,0,0.8);
  }
  @keyframes float-up {
    0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -80px) scale(0.5); opacity: 0; }
  }

  /* bottom tap hint */
  .tap-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.25);
    animation: hint-pulse 2s ease-in-out infinite;
    z-index: 10;
  }
  @keyframes hint-pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }

  /* stage floor */
  .stage-floor {
    position: absolute;
    bottom: 65px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 20px;
    background: radial-gradient(ellipse at center, rgba(255,45,120,0.25) 0%, transparent 70%);
    z-index: 1;
  }

  /* ══════════════════════════════════════
     END SCREEN
  ══════════════════════════════════════ */
  #end {
    background: radial-gradient(ellipse 80% 60% at 50% 40%, #0a1f3d 0%, var(--dark) 70%);
    overflow: hidden;
  }

  /* Crowd */
  .crowd {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 42%;
    overflow: hidden;
    z-index: 1;
  }
  .crowd-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .crowd-person {
    width: 22px; height: 38px;
    border-radius: 11px 11px 4px 4px;
    position: relative;
    animation: crowd-wave 1.5s ease-in-out infinite;
  }
  .crowd-person::before {
    content: '';
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 14px;
    border-radius: 50%;
    background: inherit;
    filter: brightness(1.3);
  }
  @keyframes crowd-wave {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .crowd-lights {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 40% 20% at 20% 50%, rgba(255,45,120,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 20% at 80% 60%, rgba(0,245,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 50% 100%, rgba(255,230,0,0.08) 0%, transparent 60%);
    animation: lights-flicker 3s ease-in-out infinite alternate;
  }
  @keyframes lights-flicker {
    0% { opacity: 0.7; }
    33% { opacity: 1; }
    66% { opacity: 0.85; }
    100% { opacity: 1; }
  }

  /* spotlight */
  .spotlight {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 100%;
    background: radial-gradient(ellipse 50% 100% at 50% 0%, rgba(255,255,255,0.08) 0%, transparent 70%);
    z-index: 2;
    pointer-events: none;
  }

  /* end content */
  .end-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -60px;
  }

  .result-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }

  .grade-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(90px, 25vw, 160px);
    line-height: 0.85;
    text-align: center;
    animation: grade-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes grade-pop {
    from { transform: scale(0.3); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .grade-F  { color: #aaa; text-shadow: 0 0 20px rgba(170,170,170,0.5); }
  .grade-D  { color: #ff8c42; text-shadow: 0 0 30px rgba(255,140,66,0.6); }
  .grade-C  { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.6); }
  .grade-B  { color: var(--lime); text-shadow: 0 0 30px rgba(170,255,0,0.7); }
  .grade-A  { color: var(--bright-cyan); text-shadow: 0 0 30px rgba(0,245,255,0.8); }
  .grade-Ap { color: var(--neon-pink); text-shadow: 0 0 30px rgba(255,45,120,0.9), 0 0 60px rgba(255,45,120,0.5); }
  .grade-App{ color: var(--electric-yellow); text-shadow: 0 0 40px rgba(255,230,0,1), 0 0 80px rgba(255,230,0,0.6); animation: grade-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both, ultra-glow 0.8s ease-in-out 0.5s infinite alternate; }
  .grade-S  { background: linear-gradient(135deg, #fff 0%, #ffe600 30%, #ff2d78 60%, #00f5ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(255,230,0,0.8)); animation: grade-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both, s-rainbow 2s linear infinite; }
  @keyframes ultra-glow {
    from { filter: drop-shadow(0 0 10px rgba(255,230,0,0.5)); }
    to   { filter: drop-shadow(0 0 40px rgba(255,230,0,1)); }
  }
  @keyframes s-rainbow {
    0% { filter: drop-shadow(0 0 20px rgba(255,230,0,1)) hue-rotate(0deg); }
    100% { filter: drop-shadow(0 0 20px rgba(255,230,0,1)) hue-rotate(360deg); }
  }

  .grade-caption {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(14px, 4vw, 20px);
    color: rgba(255,255,255,0.7);
    text-align: center;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  #end-char {
    margin-top: 8px;
    animation: end-cheer 0.8s ease-out 0.3s both;
  }
  @keyframes end-cheer {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .taps-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.35);
    margin-top: 2px;
  }

  .play-again-btn {
    margin-top: 14px;
    background: transparent;
    color: var(--white);
    border: 2px solid rgba(255,255,255,0.3);
    padding: 12px 38px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 10;
  }
  .play-again-btn:hover {
    border-color: var(--neon-pink);
    color: var(--neon-pink);
    box-shadow: 0 0 20px rgba(255,45,120,0.3);
  }

  /* ─── CHEERLEADER SVG ANIMATIONS ─── */

  /* Smooth transitions on every arm & body group */
  .char-svg .arm-group-l,
  .char-svg .arm-group-r {
    transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-box: fill-box;
  }
  .char-svg .body-group {
    transition: transform 0.18s ease-out;
    transform-box: fill-box;
    transform-origin: 50px 100px;
  }
  .char-svg .legs-group {
    transform-box: fill-box;
    transform-origin: top center;
  }

  /* ── DEFAULT pose ── */
  .char-svg .arm-group-l { transform: rotate(25deg);  transform-origin: 38px 58px; }
  .char-svg .arm-group-r { transform: rotate(-25deg); transform-origin: 62px 58px; }

  /* ── Named poses ── */
  .char-svg.pose-v      .arm-group-l { transform: rotate(-60deg); }
  .char-svg.pose-v      .arm-group-r { transform: rotate(60deg);  }

  .char-svg.pose-high   .arm-group-l { transform: rotate(-90deg); }
  .char-svg.pose-high   .arm-group-r { transform: rotate(90deg);  }

  .char-svg.pose-cheer  .arm-group-l { transform: rotate(-45deg); }
  .char-svg.pose-cheer  .arm-group-r { transform: rotate(15deg);  }

  .char-svg.pose-cheer2 .arm-group-l { transform: rotate(10deg);  }
  .char-svg.pose-cheer2 .arm-group-r { transform: rotate(-45deg); }

  .char-svg.pose-spread .arm-group-l { transform: rotate(65deg);  }
  .char-svg.pose-spread .arm-group-r { transform: rotate(-65deg); }

  .char-svg.pose-diagonal .arm-group-l { transform: rotate(-80deg); }
  .char-svg.pose-diagonal .arm-group-r { transform: rotate(30deg);  }

  /* ── Pump flash: arms shoot up on each tap, driven by class toggle ── */
  .char-svg.pumping .arm-group-l { transform: rotate(-95deg) !important; transition-duration: 0.08s; }
  .char-svg.pumping .arm-group-r { transform: rotate(95deg)  !important; transition-duration: 0.08s; }

  /* ── Jump: whole wrapper animates up/down ── */
  @keyframes char-jump {
    0%   { transform: translateX(-50%) translateY(0)   scaleY(1);    }
    30%  { transform: translateX(-50%) translateY(-38px) scaleY(1.05); }
    55%  { transform: translateX(-50%) translateY(-44px) scaleY(1.08); }
    75%  { transform: translateX(-50%) translateY(-10px) scaleY(0.98); }
    88%  { transform: translateX(-50%) translateY(4px)  scaleY(0.96); }
    100% { transform: translateX(-50%) translateY(0)   scaleY(1);    }
  }
  @keyframes char-jump-squat {
    0%  { transform: translateX(-50%) scaleY(1);    }
    20% { transform: translateX(-50%) scaleY(0.88); }
    100%{ transform: translateX(-50%) scaleY(1);    }
  }
  #game-char.jumping {
    animation: char-jump 0.55s cubic-bezier(0.33, 1, 0.68, 1) forwards;
  }

  /* ── Idle bob when not tapping ── */
  @keyframes idle-bob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(-6px); }
  }
  #game-char.idle-bob {
    animation: idle-bob 1.4s ease-in-out infinite;
  }

  /* ── Arm wave cycle (applied directly to svg groups via JS) ── */
  @keyframes wave-l {
    0%   { transform: rotate(-90deg); }
    40%  { transform: rotate(-20deg); }
    70%  { transform: rotate(-75deg); }
    100% { transform: rotate(-90deg); }
  }
  @keyframes wave-r {
    0%   { transform: rotate(90deg);  }
    40%  { transform: rotate(20deg);  }
    70%  { transform: rotate(75deg);  }
    100% { transform: rotate(90deg);  }
  }
  .char-svg.waving .arm-group-l { animation: wave-l 0.6s ease-in-out; transition: none; }
  .char-svg.waving .arm-group-r { animation: wave-r 0.6s ease-in-out; transition: none; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     START SCREEN
════════════════════════════════════════ -->
<div class="screen active" id="start">
  <div class="title-block">
    <div class="eyebrow">71dpi presents</div>
    <div class="main-title">CHEER<span class="exclaim">!</span></div>
    <div class="subtitle">15 seconds · tap like crazy</div>
  </div>

  <div id="start-char"></div>

  <button class="start-btn" id="startBtn">TAP TO START</button>
  <div class="timer-badge">🕐 15 SECOND CHALLENGE</div>

  <div class="footer">
    <a class="icon-btn num-71" href="https://71dpi.github.io" target="_blank">71</a>
    <a class="icon-btn" id="shareBtn" href="https://71dpi.github.io/gaems/vol1/#cheer" target="_blank" title="Share">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>

<!-- ═══════════════════════════════════════
     GAME SCREEN
════════════════════════════════════════ -->
<div class="screen" id="game">
  <div class="game-top">
    <div>
      <div class="timer-display" id="timerDisplay">15</div>
      <div class="timer-label">SEC</div>
    </div>
    <div class="hype-container">
      <div class="hype-label">HYPE METER</div>
      <div class="hype-bar-outer">
        <div class="hype-bar-fill" id="hypeFill"></div>
      </div>
      <div class="hype-value" id="hypeValue">0</div>

  <div class="stage-floor"></div>

<!-- ═══════════════════════════════════════
     END SCREEN

<div class="screen" id="end">

    <div class="crowd-lights"></div>
  </div>

  <div class="end-content">

    <div class="grade-caption" id="gradeCaption">Nice work!</div>

  <div class="footer">

      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>

<script>
// ─────────────────────────────────────────────
// CHARACTER DEFINITIONS
// ─────────────────────────────────────────────
const CHARACTERS = [
  {
    name: 'NOVA',
    bodyColor: '#ff2d78',
    accentColor: '#ff8fd4',
    skirtColor: '#cc0055',
    pomColor: '#ffe600',
    hairColor: '#ffe600',
    skinColor: '#f9c39a',
    caption: { F: "Even Nova can't save this...", D: "Nova tried her best!", C: "Keep cheering, Nova!", B: "Nova's heating up!", A: "Nova brings the energy!", Ap: "Nova's on fire! 🔥", App: "NOVA GOES SUPERNOVA!!", S: "✨ NOVA: LEGENDARY ✨" }
  },
  {
    name: 'STORM',
    bodyColor: '#0088ff',
    accentColor: '#88ccff',
    skirtColor: '#0055cc',
    pomColor: '#c0c0ff',
    hairColor: '#222',
    skinColor: '#c68a5a',
    caption: { F: "Storm... barely a drizzle.", D: "Storm needs more practice!", C: "The Storm is gathering...", B: "Storm's picking up speed!", A: "Storm is electric!", Ap: "STORM UNLEASHED! ⚡", App: "STORM: CATEGORY 5!!", S: "⚡ STORM: UNSTOPPABLE ⚡" }
  },
  {
    name: 'BLAZE',
    bodyColor: '#ff6600',
    accentColor: '#ffaa44',
    skirtColor: '#cc3300',
    pomColor: '#aaff00',
    hairColor: '#8B1A00',
    skinColor: '#f0c8a0',
    caption: { F: 'Blaze... more like a spark.', D: "Blaze didn't ignite today!", C: 'Blaze is warming up!', B: 'Blaze is getting hot!', A: 'Blaze is blazing! 🔥', Ap: 'BLAZE IS INFERNO!!', App: "BLAZE CAN'T BE STOPPED!!", S: '🔥 BLAZE: ETERNAL FLAME 🔥' }
  }
];

const POSES = ['pose-v','pose-high','pose-cheer','pose-cheer2','pose-spread','pose-diagonal',''];

function buildCharSVG(char, size = 130, pose = '') {
  const { bodyColor, accentColor, skirtColor, pomColor, hairColor, skinColor } = char;
  return `
  <svg class="char-svg ${pose}" width="${size}" height="${Math.round(size*1.6)}" viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
    <!-- Hair back -->
    <ellipse cx="50" cy="28" rx="18" ry="22" fill="${hairColor}" opacity="0.9"/>
    <path d="M32 34 Q22 60 26 90 Q30 82 35 75 Z" fill="${hairColor}"/>
    <!-- Face -->
    <ellipse cx="50" cy="28" rx="16" ry="18" fill="${skinColor}"/>
    <!-- Blush -->
    <ellipse cx="40" cy="33" rx="5" ry="3" fill="${bodyColor}" opacity="0.25"/>
    <ellipse cx="60" cy="33" rx="5" ry="3" fill="${bodyColor}" opacity="0.25"/>
    <!-- Eyes -->
    <ellipse cx="44" cy="25" rx="3" ry="3.5" fill="#1a1a2e"/>
    <ellipse cx="56" cy="25" rx="3" ry="3.5" fill="#1a1a2e"/>
    <circle cx="45" cy="24" r="1" fill="white"/>
    <circle cx="57" cy="24" r="1" fill="white"/>
    <!-- Smile -->
    <path d="M44 34 Q50 39 56 34" stroke="#c07050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Hair front top -->
    <ellipse cx="50" cy="12" rx="16" ry="8" fill="${hairColor}"/>
    <!-- Ponytail -->
    <path d="M66 22 Q82 16 80 32 Q78 42 70 40 Q76 30 68 28 Z" fill="${hairColor}"/>
    <!-- Body group -->
    <g class="body-group">
      <!-- Neck -->
      <rect x="45" y="44" width="10" height="10" rx="4" fill="${skinColor}"/>
      <!-- Uniform top -->
      <rect x="34" y="52" width="32" height="38" rx="8" fill="${bodyColor}"/>
      <!-- Accent stripe -->
      <rect x="34" y="62" width="32" height="8" fill="${accentColor}" opacity="0.6"/>
      <text x="50" y="76" text-anchor="middle" font-family="Bebas Neue, sans-serif" font-size="9" fill="white" opacity="0.9">${char.name}</text>
      <!-- Skirt -->
      <polygon points="28,88 72,88 80,125 20,125" fill="${skirtColor}"/>
      <polygon points="30,88 42,88 38,125 24,125" fill="${bodyColor}" opacity="0.4"/>
      <polygon points="50,88 62,88 66,125 46,125" fill="${bodyColor}" opacity="0.4"/>
      <polygon points="70,88 72,88 78,118 66,125" fill="${bodyColor}" opacity="0.4"/>
      <!-- Legs -->
      <g class="legs-group">
        <rect x="36" y="124" width="12" height="30" rx="6" fill="${skinColor}"/>
        <rect x="52" y="124" width="12" height="30" rx="6" fill="${skinColor}"/>
        <!-- Shoes -->
        <ellipse cx="42" cy="154" rx="9" ry="5" fill="white"/>
        <ellipse cx="58" cy="154" rx="9" ry="5" fill="white"/>
        <!-- Shoe stripe -->
        <rect x="34" y="152" width="16" height="3" rx="1" fill="${bodyColor}"/>
        <rect x="50" y="152" width="16" height="3" rx="1" fill="${bodyColor}"/>
      </g>
    </g>

    <!-- LEFT ARM GROUP (rotates from shoulder ~34,58) -->
    <g class="arm-group-l">
      <g style="transform-origin: 38px 58px;">
        <!-- upper arm -->
        <rect x="14" y="54" width="24" height="10" rx="5" fill="${skinColor}" transform="rotate(0,38,58)"/>
        <!-- forearm -->
        <rect x="8" y="58" width="18" height="8" rx="4" fill="${skinColor}" transform="rotate(0,38,58) translate(-6,4)"/>
        <!-- Pom pom left -->
        <g transform="translate(8,54)">
          <circle r="10" fill="${pomColor}" opacity="0.9"/>
          <circle r="10" fill="${pomColor}" opacity="0.5" transform="rotate(30)"/>
          <circle cx="4" cy="-5" r="4" fill="white" opacity="0.3"/>
        </g>
      </g>
    </g>

    <!-- RIGHT ARM GROUP (rotates from shoulder ~62,58) -->
    <g class="arm-group-r">
      <g style="transform-origin: 62px 58px;">
        <rect x="62" y="54" width="24" height="10" rx="5" fill="${skinColor}"/>
        <rect x="68" y="58" width="18" height="8" rx="4" fill="${skinColor}" transform="translate(6,4)"/>
        <!-- Pom pom right -->
        <g transform="translate(92,54)">
          <circle r="10" fill="${pomColor}" opacity="0.9"/>
          <circle r="10" fill="${pomColor}" opacity="0.5" transform="rotate(-30)"/>
          <circle cx="-4" cy="-5" r="4" fill="white" opacity="0.3"/>
        </g>
      </g>
    </g>
  </svg>`;
}

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
const GAME_DURATION = 15;
const HYPE_PER_TAP = 9;
const HYPE_DRAIN_PER_SEC = 18;
const HYPE_MAX = 100;
const POSE_TAP_INTERVAL_MIN = 2;
const POSE_TAP_INTERVAL_MAX = 4;
const JUMP_EVERY_N_TAPS = 8;

let selectedChar, hype, totalTaps, timeLeft, gameInterval, drainInterval, poseNextTap, currentPose, jumpNextTap;
let gameActive = false;
let idleTimer = null;
let pumpTimeout = null;

// ─────────────────────────────────────────────
// SCREEN MANAGEMENT
// ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─────────────────────────────────────────────
// CHEERLEADER RENDERING
// ─────────────────────────────────────────────
function renderChar(container, char, size, pose = '') {
  container.innerHTML = buildCharSVG(char, size, pose);
}

function setPose(pose, charContainer) {
  const svg = charContainer.querySelector('.char-svg');
  if (!svg) return;
  POSES.forEach(p => svg.classList.remove(p));
  if (pose) svg.classList.add(pose);
}

function randomPose(except) {
  const options = POSES.filter(p => p !== except);
  return options[Math.floor(Math.random() * options.length)];
}

// ─────────────────────────────────────────────
// TAP FX
// ─────────────────────────────────────────────
const words = ['HYPE!','YES!','GO!','WOO!','BOOM!','POW!','YEAH!','LFG!'];
function spawnParticle(x, y) {
  const el = document.createElement('div');
  el.className = 'tap-particle';
  el.textContent = words[Math.floor(Math.random() * words.length)];
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.fontSize = (18 + Math.random() * 14) + 'px';
  el.style.color = ['#ffe600','#ff2d78','#00f5ff','#aaff00'][Math.floor(Math.random()*4)];
  document.getElementById('game').appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function spawnRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'ripple';
  const size = 60 + Math.random() * 80;
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.getElementById('game').appendChild(el);
  setTimeout(() => el.remove(), 600);
}

// ─────────────────────────────────────────────
// GRADING
// ─────────────────────────────────────────────
const GRADES = [
  { min: 120, key: 'S',   label: 'S',   classKey: 'grade-S'   },
  { min: 95,  key: 'App', label: 'A++', classKey: 'grade-App' },
  { min: 75,  key: 'Ap',  label: 'A+',  classKey: 'grade-Ap'  },
  { min: 55,  key: 'A',   label: 'A',   classKey: 'grade-A'   },
  { min: 38,  key: 'B',   label: 'B',   classKey: 'grade-B'   },
  { min: 24,  key: 'C',   label: 'C',   classKey: 'grade-C'   },
  { min: 12,  key: 'D',   label: 'D',   classKey: 'grade-D'   },
  { min: 0,   key: 'F',   label: 'F',   classKey: 'grade-F'   },
];

function getGrade(taps) {
  return GRADES.find(g => taps >= g.min);
}

// ─────────────────────────────────────────────
// CROWD GENERATION
// ─────────────────────────────────────────────
const CROWD_COLORS = ['#ff2d78','#0088ff','#ff6600','#aa00ff','#00cc88','#ffaa00','#00aaff','#ff0066'];
function buildCrowd() {
  const crowd = document.getElementById('crowd');
  // keep lights div
  const lights = crowd.querySelector('.crowd-lights');
  crowd.innerHTML = '';
  crowd.appendChild(lights);
  const rows = 4;
  for (let r = 0; r < rows; r++) {
    const row = document.createElement('div');
    row.className = 'crowd-row';
    const count = 8 + r * 2;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'crowd-person';
      const col = CROWD_COLORS[Math.floor(Math.random() * CROWD_COLORS.length)];
      p.style.background = col;
      p.style.animationDelay = (Math.random() * 1.5) + 's';
      p.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
      p.style.opacity = (0.5 + Math.random() * 0.5);
      row.appendChild(p);
    }
    crowd.appendChild(row);
  }
}

// ─────────────────────────────────────────────
// GAME FLOW
// ─────────────────────────────────────────────
function startGame() {
  selectedChar = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
  hype = 0;
  totalTaps = 0;
  timeLeft = GAME_DURATION;
  currentPose = '';
  poseNextTap = POSE_TAP_INTERVAL_MIN + Math.floor(Math.random() * (POSE_TAP_INTERVAL_MAX - POSE_TAP_INTERVAL_MIN));
  jumpNextTap = JUMP_EVERY_N_TAPS;
  if (idleTimer) clearTimeout(idleTimer);
  if (pumpTimeout) clearTimeout(pumpTimeout);

  // render initial char
  const gameChar = document.getElementById('game-char');
  renderChar(gameChar, selectedChar, 130, '');
  updateHypeMeter();

  document.getElementById('timerDisplay').textContent = timeLeft;
  document.getElementById('timerDisplay').classList.remove('warn');

  // Start idle bob immediately
  gameChar.classList.add('idle-bob');

  showScreen('game');

  // Timer
  gameInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timerDisplay').textContent = timeLeft;
    if (timeLeft <= 5) document.getElementById('timerDisplay').classList.add('warn');
    if (timeLeft <= 0) endGame();
  }, 1000);

  // Drain
  drainInterval = setInterval(() => {
    hype = Math.max(0, hype - HYPE_DRAIN_PER_SEC / 10);
    updateHypeMeter();
  }, 100);

  gameActive = true;
}

function updateHypeMeter() {
  const fill = document.getElementById('hypeFill');
  const val = document.getElementById('hypeValue');
  const pct = Math.min(100, hype);
  fill.style.width = pct + '%';
  val.textContent = Math.round(hype);
}

function triggerPump(gameChar) {
  const svg = gameChar.querySelector('.char-svg');
  if (!svg) return;
  // Remove pump so we can re-trigger
  svg.classList.remove('pumping');
  void svg.offsetWidth; // reflow
  svg.classList.add('pumping');
  clearTimeout(pumpTimeout);
  // After 120ms arms snap back to current pose
  pumpTimeout = setTimeout(() => {
    svg.classList.remove('pumping');
  }, 120);
}

function triggerJump(gameChar) {
  gameChar.classList.remove('jumping', 'idle-bob');
  void gameChar.offsetWidth;
  gameChar.classList.add('jumping');
  setTimeout(() => {
    gameChar.classList.remove('jumping');
    if (gameActive) gameChar.classList.add('idle-bob');
  }, 560);
}

function resetIdleBob(gameChar) {
  // Restart idle-bob timer: if no tap in 600ms, resume gentle bob
  clearTimeout(idleTimer);
  gameChar.classList.remove('idle-bob');
  idleTimer = setTimeout(() => {
    if (gameActive) gameChar.classList.add('idle-bob');
  }, 600);
}

function onTap(e) {
  if (!gameActive || timeLeft <= 0) return;
  e.preventDefault();

  totalTaps++;
  hype = Math.min(HYPE_MAX, hype + HYPE_PER_TAP + (Math.random() * 4 - 2));
  updateHypeMeter();

  // Get tap coordinates
  let tx, ty;
  if (e.touches && e.touches[0]) {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  } else {
    tx = e.clientX;
    ty = e.clientY;
  }

  spawnRipple(tx, ty);
  if (Math.random() > 0.3) spawnParticle(tx, ty - 30);

  const gameChar = document.getElementById('game-char');

  // Arm pump on every single tap
  triggerPump(gameChar);

  // Reset idle bob
  resetIdleBob(gameChar);

  // Jump every N taps
  if (totalTaps >= jumpNextTap) {
    triggerJump(gameChar);
    jumpNextTap = totalTaps + JUMP_EVERY_N_TAPS;
  }

  // Pose change every 2-4 taps
  if (totalTaps >= poseNextTap) {
    currentPose = randomPose(currentPose);
    setPose(currentPose, gameChar);
    poseNextTap = totalTaps + POSE_TAP_INTERVAL_MIN + Math.floor(Math.random() * (POSE_TAP_INTERVAL_MAX - POSE_TAP_INTERVAL_MIN));
  }
}

function endGame() {
  gameActive = false;
  clearInterval(gameInterval);
  clearInterval(drainInterval);

  const grade = getGrade(totalTaps);
  const caption = selectedChar.caption[grade.key];

  // Show end screen
  document.getElementById('gradeDisplay').textContent = grade.label;
  document.getElementById('gradeDisplay').className = 'grade-display ' + grade.classKey;
  document.getElementById('gradeCaption').textContent = caption;
  document.getElementById('tapsCount').textContent = totalTaps + ' TAPS';

  // Render end char with V pose for good grades, spread for bad
  const endPose = ['S','App','Ap','A','B'].includes(grade.key) ? 'pose-high' : 'pose-spread';
  renderChar(document.getElementById('end-char'), selectedChar, 100, endPose);

  buildCrowd();
  showScreen('end');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  // Render start screen character
  const startChar = document.getElementById('start-char');
  const randomStartChar = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
  renderChar(startChar, randomStartChar, 120, 'pose-high');

  // Start button
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('playAgainBtn').addEventListener('click', () => {
    showScreen('start');
    const c = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
    renderChar(document.getElementById('start-char'), c, 120, 'pose-high');
  });

  // Game tap listeners
  const gameScreen = document.getElementById('game');
  gameScreen.addEventListener('touchstart', onTap, { passive: false });
  gameScreen.addEventListener('mousedown', onTap);

  // Share button
  document.getElementById('shareBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const url = 'https://71dpi.github.io/gaems/vol1/#cheer';
    if (navigator.share) {
      navigator.share({ title: 'CHEER!', text: 'Can you get S rank?', url });
    } else {
      navigator.clipboard?.writeText(url).then(() => {
        const btn = document.getElementById('shareBtn');
        btn.style.borderColor = '#aaff00';
        setTimeout(() => btn.style.borderColor = '', 1500);
      });
      window.open(url, '_blank');
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
